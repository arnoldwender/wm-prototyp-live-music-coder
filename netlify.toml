# Netlify build configuration for Vite SPA
[build]
  command = "npm run build"
  publish = "dist"

# Security headers — CSP, clickjacking, MIME sniffing protection
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com https://raw.githubusercontent.com; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# SPA redirect — all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
