# Netlify build configuration for Vite SPA
# ──────────────────────────────────────────────────────────────────────
# CONTINUOUS DEPLOYMENT IS DISABLED (manually disabled 2026-04-13)
# Reason: production builds run locally with NODE_OPTIONS=--max-old-space-size=8192
# and are deployed via: netlify deploy --prod --dir=dist
# The build command below is kept for reference but is NOT triggered on push.
# ──────────────────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

# Security headers — CSP, clickjacking, MIME sniffing protection
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' blob: data:; script-src-elem 'self' 'unsafe-inline' blob: data:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com https://raw.githubusercontent.com https://*.githubusercontent.com https://freesound.org https://*.freesound.org; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self' data:; worker-src 'self' blob: data:; frame-src 'none'; object-src 'none'; base-uri 'self'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# SPA redirect — all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
