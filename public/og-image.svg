<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: dark IDE aesthetic -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle grid lines (code editor feel) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#18181b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Purple glow behind logo area -->
  <ellipse cx="600" cy="260" rx="300" ry="180" fill="#a855f7" opacity="0.06"/>
  <ellipse cx="600" cy="260" rx="160" ry="100" fill="#a855f7" opacity="0.08"/>

  <!-- Waveform visualization (decorative bars) -->
  <g transform="translate(340, 140)" opacity="0.3">
    <rect x="0" y="50" width="12" height="40" rx="6" fill="#a855f7" opacity="0.4"/>
    <rect x="20" y="30" width="12" height="80" rx="6" fill="#a855f7" opacity="0.5"/>
    <rect x="40" y="15" width="12" height="110" rx="6" fill="#a855f7" opacity="0.6"/>
    <rect x="60" y="25" width="12" height="90" rx="6" fill="#3b82f6" opacity="0.5"/>
    <rect x="80" y="40" width="12" height="60" rx="6" fill="#3b82f6" opacity="0.4"/>
    <rect x="100" y="10" width="12" height="120" rx="6" fill="#a855f7" opacity="0.7"/>
    <rect x="120" y="35" width="12" height="70" rx="6" fill="#22c55e" opacity="0.5"/>
    <rect x="140" y="20" width="12" height="100" rx="6" fill="#a855f7" opacity="0.6"/>
    <rect x="160" y="45" width="12" height="50" rx="6" fill="#f97316" opacity="0.4"/>
    <rect x="180" y="5" width="12" height="130" rx="6" fill="#a855f7" opacity="0.8"/>
    <rect x="200" y="30" width="12" height="80" rx="6" fill="#3b82f6" opacity="0.5"/>
    <rect x="220" y="15" width="12" height="110" rx="6" fill="#a855f7" opacity="0.6"/>
    <rect x="240" y="40" width="12" height="60" rx="6" fill="#22c55e" opacity="0.4"/>
    <rect x="260" y="25" width="12" height="90" rx="6" fill="#a855f7" opacity="0.5"/>
    <rect x="280" y="50" width="12" height="40" rx="6" fill="#3b82f6" opacity="0.4"/>
    <rect x="300" y="20" width="12" height="100" rx="6" fill="#a855f7" opacity="0.6"/>
    <rect x="320" y="35" width="12" height="70" rx="6" fill="#f97316" opacity="0.5"/>
    <rect x="340" y="10" width="12" height="120" rx="6" fill="#a855f7" opacity="0.7"/>
    <rect x="360" y="30" width="12" height="80" rx="6" fill="#22c55e" opacity="0.5"/>
    <rect x="380" y="45" width="12" height="50" rx="6" fill="#a855f7" opacity="0.4"/>
    <rect x="400" y="15" width="12" height="110" rx="6" fill="#3b82f6" opacity="0.6"/>
    <rect x="420" y="25" width="12" height="90" rx="6" fill="#a855f7" opacity="0.5"/>
    <rect x="440" y="5" width="12" height="130" rx="6" fill="#a855f7" opacity="0.7"/>
    <rect x="460" y="40" width="12" height="60" rx="6" fill="#22c55e" opacity="0.4"/>
    <rect x="480" y="50" width="12" height="40" rx="6" fill="#a855f7" opacity="0.3"/>
    <rect x="500" y="35" width="12" height="70" rx="6" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- Lightning bolt icon (from favicon, simplified) -->
  <g transform="translate(556, 195) scale(1.8)">
    <path fill="#a855f7" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- App name -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#fafafa" letter-spacing="-0.02em">Live Music Coder</text>

  <!-- Tagline -->
  <text x="600" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a1a1aa" letter-spacing="0.02em">Write Code, Hear Music, Live</text>

  <!-- Engine dots row -->
  <g transform="translate(478, 465)">
    <circle cx="0" cy="0" r="5" fill="#a855f7"/>
    <text x="14" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#71717a">Strudel</text>
    <circle cx="95" cy="0" r="5" fill="#3b82f6"/>
    <text x="109" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#71717a">Tone.js</text>
    <circle cx="185" cy="0" r="5" fill="#22c55e"/>
    <text x="199" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#71717a">Web Audio</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#a855f7" opacity="0.6"/>

  <!-- Wender Media credit -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#3f3f46">by Wender Media</text>
</svg>
